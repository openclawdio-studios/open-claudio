version: '3.8'

services:
  # mosquitto:                                  # DISABLED — image pull issue (Cloudflare R2 connectivity)
  #   image: eclipse-mosquitto:2               # Re-enable when network access is restored or use
  #   container_name: open-claudio-mosquitto   # Option B: install Mosquitto on the host and set
  #   ports:                                   # MQTT_HOST=host.docker.internal in .env
  #     - "1883:1883"
  #   volumes:
  #     - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
  #     - mosquitto_data:/mosquitto/data
  #   networks:
  #     - claudio-net
  #   restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: open-claudio-postgres
    environment:
      POSTGRES_DB: claudio
      POSTGRES_USER: claudio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claudio_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - claudio-net
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: open-claudio-adminer
    ports:
      - "8090:8080"
    depends_on:
      - postgres
    networks:
      - claudio-net

  mcp_domotics:
    build:
      context: ./mcp_domotics
    container_name: open-claudio-domotics
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_fermax:
    build:
      context: ./mcp_fermax
    container_name: open-claudio-fermax
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_rag:
    build:
      context: ./mcp_rag
    container_name: open-claudio-rag
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - RAG_PORT=8002
      - RAG_DATA_DIR=/data
    volumes:
      - rag_data:/data
      - ./docs:/docs:ro
    networks:
      - claudio-net

  mcp_dashboard:
    build:
      context: ./mcp_dashboard
    container_name: open-claudio-dashboard
    ports:
      - "8082:8082"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse,http://mcp_rag:8002/sse
    env_file:
      - .env
    depends_on:
      - mcp_domotics
      - mcp_fermax
      - mcp_rag
    networks:
      - claudio-net

  web:
    build:
      context: ./web
    container_name: open-claudio-web
    ports:
      - "8088:8088"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://claudio:${POSTGRES_PASSWORD:-claudio_dev}@postgres:5432/claudio
      - AGENT_QUERY_URL=http://agent:8080/query
      - HTTP_EVENT_SECRET=${HTTP_EVENT_SECRET}
    depends_on:
      - postgres
      - agent
    networks:
      - claudio-net
    restart: unless-stopped

  agent:
    build:
      context: ./agent
    container_name: open-claudio-agent
    depends_on:
      - mcp_domotics
      - mcp_fermax
      - mcp_rag
      # - mosquitto                             # Re-enable when mosquitto service is active
    ports:
      - "8085:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse,http://mcp_rag:8002/sse
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      # - MQTT_ENABLED=true                      # Uncomment to enable MQTT source
      # - MQTT_HOST=mosquitto                   # Uncomment when mosquitto service is active
      # - MQTT_PORT=1883
      # Uncomment to enable sources:
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS}
      - HTTP_EVENT_ENABLED=true
      - HTTP_EVENT_PORT=8080
      - HTTP_EVENT_SECRET=${HTTP_EVENT_SECRET}
    env_file:
      - .env
    volumes:
      - ./agent/memory.json:/app/memory.json
    tty: true
    stdin_open: true
    networks:
      - claudio-net

volumes:
  postgres_data:                                 # PostgreSQL persistent storage
  rag_data:                                      # ChromaDB persistent storage
# volumes:                                       # Re-enable with mosquitto service
#   mosquitto_data:

networks:
  claudio-net:
    driver: bridge
