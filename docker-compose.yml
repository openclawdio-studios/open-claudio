version: '3.8'

services:
  # mosquitto:                                  # DISABLED — image pull issue (Cloudflare R2 connectivity)
  #   image: eclipse-mosquitto:2               # Re-enable when network access is restored or use
  #   container_name: open-claudio-mosquitto   # Option B: install Mosquitto on the host and set
  #   ports:                                   # MQTT_HOST=host.docker.internal in .env
  #     - "1883:1883"
  #   volumes:
  #     - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
  #     - mosquitto_data:/mosquitto/data
  #   networks:
  #     - claudio-net
  #   restart: unless-stopped

  mcp_domotics:
    build:
      context: ./mcp_domotics
    container_name: open-claudio-domotics
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_fermax:
    build:
      context: ./mcp_fermax
    container_name: open-claudio-fermax
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_dashboard:
    build:
      context: ./mcp_dashboard
    container_name: open-claudio-dashboard
    ports:
      - "8082:8082"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse
    env_file:
      - .env
    depends_on:
      - mcp_domotics
      - mcp_fermax
    networks:
      - claudio-net

  agent:
    build:
      context: ./agent
    container_name: open-claudio-agent
    depends_on:
      - mcp_domotics
      - mcp_fermax
      # - mosquitto                             # Re-enable when mosquitto service is active
    ports:
      - "8085:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      # - MQTT_ENABLED=true                      # Uncomment to enable MQTT source
      # - MQTT_HOST=mosquitto                   # Uncomment when mosquitto service is active
      # - MQTT_PORT=1883
      # Uncomment to enable sources:
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS}
      - HTTP_EVENT_ENABLED=true
      - HTTP_EVENT_SECRET=${HTTP_EVENT_SECRET}
    env_file:
      - .env
    volumes:
      - ./agent/memory.json:/app/memory.json
    tty: true
    stdin_open: true
    networks:
      - claudio-net

# volumes:                                       # Re-enable with mosquitto service
#   mosquitto_data:

networks:
  claudio-net:
    driver: bridge
