version: '3.8'

services:
  mcp_domotics:
    build:
      context: ./mcp_domotics
    container_name: open-claudio-domotics
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_fermax:
    build:
      context: ./mcp_fermax
    container_name: open-claudio-fermax
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - claudio-net

  mcp_dashboard:
    build:
      context: ./mcp_dashboard
    container_name: open-claudio-dashboard
    ports:
      - "8082:8082"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse
    env_file:
      - .env
    depends_on:
      - mcp_domotics
      - mcp_fermax
    networks:
      - claudio-net

  agent:
    build:
      context: ./agent
    container_name: open-claudio-agent
    depends_on:
      - mcp_domotics
      - mcp_fermax
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URLS=http://mcp_domotics:8000/sse,http://mcp_fermax:8001/sse
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
    env_file:
      - .env
    volumes:
      - ./agent/memory.json:/app/memory.json
    # Using tty/stdin_open to keep it interactive. We'll attach to it via `docker attach open-claudio-agent`
    tty: true
    stdin_open: true
    networks:
      - claudio-net

networks:
  claudio-net:
    driver: bridge
